name: Write Case Study

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repo (owner/name)'
        required: true
      issue_number:
        description: 'Tracking issue number'
        required: true

permissions:
  contents: write
  issues: write
  id-token: write

concurrency:
  group: nlpm-auditor-registry
  cancel-in-progress: false

jobs:
  write:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.label.name == 'case-study-ready')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false

      - name: Extract target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_ISSUE: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "repo=$INPUT_REPO" >> "$GITHUB_OUTPUT"
            echo "issue=$INPUT_ISSUE" >> "$GITHUB_OUTPUT"
          else
            REPO=$(echo "$ISSUE_TITLE" | sed 's/Audit candidate: //')
            echo "repo=$REPO" >> "$GITHUB_OUTPUT"
            echo "issue=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Gather evidence from GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          mkdir -p /tmp/evidence

          # Repo metadata
          gh api "repos/$TARGET_REPO" --jq '{
            name: .full_name, description: .description,
            stars: .stargazers_count, forks: .forks_count,
            owner_login: .owner.login, owner_type: .owner.type
          }' > /tmp/evidence/repo.json

          # Owner profile
          OWNER=$(echo "$TARGET_REPO" | cut -d/ -f1)
          gh api "users/$OWNER" --jq '{login, name, html_url}' \
            > /tmp/evidence/owner.json 2>/dev/null || echo "{}" > /tmp/evidence/owner.json

          # Our PRs and issues
          gh pr list --repo "$TARGET_REPO" --author xiaolai --state all \
            --json number,title,state,createdAt,closedAt,mergedAt,labels,url \
            > /tmp/evidence/prs.json 2>/dev/null || echo "[]" > /tmp/evidence/prs.json

          gh issue list --repo "$TARGET_REPO" --author xiaolai --state all \
            --json number,title,state,createdAt,closedAt,url \
            > /tmp/evidence/issues.json 2>/dev/null || echo "[]" > /tmp/evidence/issues.json

          # Commits mentioning NLPM or Claude co-authorship
          gh api "repos/$TARGET_REPO/commits?per_page=50" \
            --jq '[.[] | select(.commit.message | test("nlpm|NLPM|Co-Authored-By.*Claude"; "i")) | {
              sha: .sha, message: .commit.message,
              date: .commit.committer.date, url: .html_url
            }]' > /tmp/evidence/commits.json 2>/dev/null || echo "[]" > /tmp/evidence/commits.json

          # PR review comments
          jq -r '.[].number' /tmp/evidence/prs.json 2>/dev/null | while read -r pr_num; do
            gh api "repos/$TARGET_REPO/pulls/$pr_num/reviews" \
              --jq '[.[] | {user: .user.login, state: .state, body: .body}]' \
              > "/tmp/evidence/pr-${pr_num}-reviews.json" 2>/dev/null || true
            sleep 1
          done

          # Copy audit report
          REPORT="auditor/audits/${TARGET_REPO//\//-}.md"
          [ -f "$REPORT" ] && cp "$REPORT" /tmp/evidence/audit-report.md || echo "No audit report" > /tmp/evidence/audit-report.md

      - name: Prepare case study prompt
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          cat > /tmp/case-study-prompt.md <<PROMPT_EOF
          You are writing a case study article about an NLPM audit engagement.

          ## Source Material

          All evidence is in /tmp/evidence/ — read EVERY file:
          - repo.json: target repo metadata
          - owner.json: repo owner profile
          - prs.json: all PRs we submitted (with URLs)
          - issues.json: tracking issues we created
          - commits.json: commits mentioning NLPM or Claude
          - pr-*-reviews.json: maintainer review comments
          - audit-report.md: the full NLPM scoring report

          ## Article Template

          Write to: case-studies/$SLUG.md

          Structure:
          1. **Title** — creative, hints at what was learned
          2. **Disclosure** — mandatory blockquote:
             > **Disclosure**: This article was generated by an automated pipeline using Claude (Sonnet 4.6) based on audit data and GitHub records. It describes work performed by NLPM tooling maintained by [xiaolai](https://github.com/xiaolai). Readers should weigh claims accordingly.
          3. **The Project** — what it is, who maintains it (link owner profile), star count (once)
          4. **The Audit** — overall score, distribution (mermaid pie chart), top issues, fair assessment
          5. **What Was Submitted** — each PR with GitHub URL, title, fix description
          6. **The Response** — maintainer reaction from review comments and commits
          7. **What the Audit Revealed** — patterns with fairness note
          8. **Timeline** — mermaid gantt chart from PR/issue timestamps
          9. **Limitations** — what this doesn't prove
          10. **Significance** — measured, not inflated

          ## Style Rules (first draft)
          - Write clean, factual prose first — ornate wording comes in the polish pass
          - ALL links from evidence files — never fabricate URLs
          - ALL numbers from evidence files — never guess
          - If evidence is missing for a section, say so honestly

          ## Mermaid Diagram Requirements
          - Score distribution: mermaid pie chart
          - Timeline: mermaid gantt chart (dateFormat YYYY-MM-DD HH:mm, axisFormat %H:%M)
          - PR priority grouping: mermaid graph LR with colored subgraphs if 3+ priority tiers
          - Parallel/sequential failure: mermaid sequenceDiagram if applicable
          - Find ANY data that would be clearer as a diagram than a table — use mermaid
          - Do NOT use ASCII art or text-based diagrams — always mermaid

          ## Also write
          - /tmp/case-study-summary.txt: one-line summary for the issue comment
          PROMPT_EOF

      - name: Write with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: /tmp/case-study-prompt.md
          allowed_tools: Read,Glob,Grep,Write,Bash

      # ================================================================
      # STEP A: Self-Review — 6 perspectives (replaces external Codex review)
      # ================================================================
      - name: Prepare self-review prompt
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          cat > /tmp/self-review-prompt.md <<'REVIEW_EOF'
          You are a critical reviewer. Read the case study draft and evaluate it from 6 perspectives.
          Write your findings to /tmp/review-findings.md.

          Read the article at case-studies/SLUG_PLACEHOLDER.md

          ## Perspective 1: Technical Accuracy
          - Are claims about YAML behavior, Claude Code runtime, and scoring correct?
          - Do penalty values match NLPM's actual rubric?
          - Are PR descriptions technically sound?

          ## Perspective 2: Narrative Structure
          - Does the story flow logically?
          - Are there pacing problems — sections that drag or rush?
          - Is there a timing/math inconsistency anywhere?

          ## Perspective 3: Journalistic Integrity
          - Are there claims not substantiated by the evidence files?
          - Is the maintainer's perspective fairly represented?
          - Are failures given appropriate weight vs successes?

          ## Perspective 4: Marketing Bias
          - Does it read as an NLPM ad disguised as a case study?
          - Are metrics cherry-picked or selectively presented?
          - Is the significance oversold?

          ## Perspective 5: Missing Context
          - What would a maintainer want readers to know that's not here?
          - Is there fairness context about the project's development pace?

          ## Perspective 6: Counterarguments
          - Could any "defects" be intentional design choices?
          - Are NLPM's rules themselves debatable here?
          - Is the score framed more negatively than warranted?

          ## Output Format

          Write to /tmp/review-findings.md:

          For each perspective:
          ### Perspective N: Name
          | # | Severity | Finding | Recommendation |
          |---|----------|---------|----------------|

          Then:
          ### Top 5 Issues (by credibility impact)
          ### Strengths
          REVIEW_EOF

          sed -i "s/SLUG_PLACEHOLDER/$SLUG/g" /tmp/self-review-prompt.md 2>/dev/null || \
          sed -i '' "s/SLUG_PLACEHOLDER/$SLUG/g" /tmp/self-review-prompt.md

      - name: Self-review with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: /tmp/self-review-prompt.md
          allowed_tools: Read,Glob,Grep,Write

      # ================================================================
      # STEP B: Apply review fixes
      # ================================================================
      - name: Prepare fix prompt
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          cat > /tmp/apply-fixes-prompt.md <<FIXES_EOF
          You are an editor. Read the review findings at /tmp/review-findings.md and the article at case-studies/$SLUG.md.

          Apply fixes for every HIGH and CRITICAL finding. For MEDIUM findings, apply if the fix is clear.

          ## Fix categories

          **Technical accuracy**: correct any factual errors. Cross-check against /tmp/evidence/*.json.
          **Timing errors**: verify all timestamps against PR/issue creation dates in /tmp/evidence/prs.json and /tmp/evidence/issues.json.
          **Missing name: nuance**: if the article claims missing name: is a "guaranteed crash", soften to "non-canonical, portability concern" — Claude Code may fall back to filename.
          **Scalar-string tools:**: if flagged as a bug, reframe as convention preference and note NLPM v0.7.0 accepts both formats.
          **Score framing**: if 74/100 (or similar) is framed negatively, add that it passes the default 70 threshold.
          **Missing fairness note**: if absent, add one acknowledging the project's development pace and quality orientation.
          **Missing disclosure**: if the disclosure blockquote is absent, add it.
          **Missing limitations section**: if absent, add one with 3-4 caveats.
          **Oversold significance**: tone down if the closing is too strong.

          ## Rules
          - Use Edit tool — surgical fixes, not rewrites
          - Do NOT change mermaid blocks
          - Do NOT remove content that's accurate
          - Do NOT add new sections beyond what the review recommends
          FIXES_EOF

      - name: Apply fixes with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: /tmp/apply-fixes-prompt.md
          allowed_tools: Read,Edit,Grep

      # ================================================================
      # STEP C: Verify facts against GitHub API
      # ================================================================
      - name: Verify facts
        id: factcheck
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          ARTICLE="case-studies/${SLUG}.md"
          ERRORS=0

          if [ ! -f "$ARTICLE" ]; then
            echo "No article — skipping fact check"
            exit 0
          fi

          echo "=== Fact-checking $ARTICLE ==="
          > /tmp/fact-check-errors.txt

          # Check 1: Verify all GitHub PR/issue links resolve
          grep -oP 'https://github\.com/[^/]+/[^/]+/(pull|issues)/\d+' "$ARTICLE" | sort -u | while read -r url; do
            REPO_PATH=$(echo "$url" | sed 's|https://github.com/||' | sed 's|/pull/|/pulls/|' | sed 's|/issues/|/issues/|')
            TYPE=$(echo "$url" | grep -oP '(pull|issues)')
            NUM=$(echo "$url" | grep -oP '\d+$')
            API_REPO=$(echo "$url" | sed 's|https://github.com/||' | sed 's|/pull/.*||' | sed 's|/issues/.*||')

            if [ "$TYPE" = "pull" ]; then
              STATUS=$(gh pr view "$NUM" --repo "$API_REPO" --json state --jq '.state' 2>/dev/null || echo "NOT_FOUND")
            else
              STATUS=$(gh issue view "$NUM" --repo "$API_REPO" --json state --jq '.state' 2>/dev/null || echo "NOT_FOUND")
            fi

            if [ "$STATUS" = "NOT_FOUND" ]; then
              echo "BROKEN LINK: $url" | tee -a /tmp/fact-check-errors.txt
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: $url ($STATUS)"
            fi
            sleep 0.5
          done

          # Check 2: Verify commit links
          grep -oP 'https://github\.com/[^/]+/[^/]+/commit/[a-f0-9]+' "$ARTICLE" | sort -u | while read -r url; do
            SHA=$(echo "$url" | grep -oP '[a-f0-9]+$')
            API_REPO=$(echo "$url" | sed 's|https://github.com/||' | sed 's|/commit/.*||')
            STATUS=$(gh api "repos/$API_REPO/commits/$SHA" --jq '.sha' 2>/dev/null || echo "NOT_FOUND")

            if [ "$STATUS" = "NOT_FOUND" ]; then
              echo "BROKEN COMMIT LINK: $url" | tee -a /tmp/fact-check-errors.txt
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: $url"
            fi
            sleep 0.5
          done

          # Check 3: Verify repo links
          grep -oP 'https://github\.com/[a-zA-Z0-9_-]+/[a-zA-Z0-9_-]+(?=\))' "$ARTICLE" | sort -u | while read -r url; do
            REPO_NAME=$(echo "$url" | sed 's|https://github.com/||')
            # Skip if it's a PR/issue/commit link (already checked)
            echo "$REPO_NAME" | grep -qP '(pull|issues|commit)' && continue
            STATUS=$(gh api "repos/$REPO_NAME" --jq '.full_name' 2>/dev/null || echo "NOT_FOUND")

            if [ "$STATUS" = "NOT_FOUND" ]; then
              echo "BROKEN REPO LINK: $url" | tee -a /tmp/fact-check-errors.txt
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: $url"
            fi
            sleep 0.5
          done

          if [ -s /tmp/fact-check-errors.txt ]; then
            echo ""
            echo "=== FACT CHECK FAILURES ==="
            cat /tmp/fact-check-errors.txt
            echo "Errors will be fixed in next step"
          else
            echo ""
            echo "=== All facts verified ==="
          fi

          echo "has_errors=$([ -s /tmp/fact-check-errors.txt ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Fix broken links (if any)
        if: steps.factcheck.outputs.has_errors == 'true'
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          if [ ! -s /tmp/fact-check-errors.txt ]; then
            echo "No fact-check errors — skipping"
            exit 0
          fi

          SLUG="${TARGET_REPO//\//-}"
          cat > /tmp/fix-links-prompt.md <<LINKS_EOF
          Broken links were found in the article.
          Read /tmp/fact-check-errors.txt for the list.
          Read the article at case-studies/$SLUG.md.

          For each broken link:
          - If it's a wrong PR/issue number: check /tmp/evidence/prs.json and issues.json for the correct number
          - If it's a wrong repo path: check /tmp/evidence/repo.json for the correct name
          - If it's a wrong commit SHA: check /tmp/evidence/commits.json for the correct SHA
          - If the link simply doesn't exist: remove the link but keep the text

          Use Edit tool for surgical fixes only.
          LINKS_EOF

      - name: Fix links with Claude Code
        if: steps.factcheck.outputs.has_errors == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: /tmp/fix-links-prompt.md
          allowed_tools: Read,Edit,Grep

      # ================================================================
      # STEP D: Polish prose — ornate wording
      # ================================================================
      - name: Prepare polish prompt
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          cat > /tmp/polish-prompt.md <<'POLISH_EOF'
          You are a prose polisher. Read the case study article and add literary texture.

          ## What to add (sparingly — 8-15 touches total)

          **Similes** — compare technical concepts to everyday things:
          - "like handing someone a magnifying glass and pointing at a building"
          - "like a bridge with 80 bolts where 5 are missing"

          **Metaphors** — make abstract things concrete:
          - "a mirror as much as a microscope"
          - "the git equivalent of five chefs sharing one cutting board"

          **Analogies** — connect unfamiliar to familiar:
          - "discovered defects the way you discover a hole in your umbrella — by getting rained on"
          - "like a receptionist who only says 'ask the person down the hall'"

          **Punch lines** — reward the reader at key moments:
          - "Sometimes the sequel is shorter than the blooper reel"
          - "In open source, it's perfectly fine to arrive second with the right answer"

          **Witty observations** — gentle, never sarcastic:
          - "missing its own name" (for a command without a name: field)
          - "a quiet acknowledgment that the diagnosis came from somewhere worth naming"

          **Light jokes** — only where the narrative earns one:
          - After a failure: a self-deprecating quip
          - After an ironic outcome: note the irony gently

          ## Where to place them

          1. **Title** — creative, not generic ("When the Linter Met Its Match" not "NLPM Audit Report")
          2. **Opening** — the first paragraph after disclosure sets the tone
          3. **After failures** — the parallel agent mess, rejected PRs, duplicate closures
          4. **Transition sentences** — between major sections
          5. **The fairness note** — warmth, not formality
          6. **Closing paragraph** — the most memorable line in the piece goes here

          ## Rules

          - SOFT TONE — never presumptuous, never mocking the target project
          - Polite — these are other people's hard work
          - Do NOT add ornament to technical tables, code blocks, mermaid blocks, or data
          - Do NOT change any facts, numbers, links, or evidence
          - Do NOT add more than 15 touches — restraint is elegance
          - Each touch must serve the narrative, not just decorate

          ## Process

          1. Read the full article
          2. Identify the 10-15 strongest spots for literary touches
          3. Apply each using the Edit tool — add phrases, swap adjectives, insert one-liners
          4. Do NOT rewrite paragraphs — this is seasoning, not cooking
          POLISH_EOF

      - name: Polish with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: /tmp/polish-prompt.md
          allowed_tools: Read,Edit,Grep

      # ================================================================
      # STEP E: Validate all links (final pass after polish)
      # ================================================================
      - name: Final link validation
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          ARTICLE="case-studies/${SLUG}.md"

          [ ! -f "$ARTICLE" ] && exit 0

          # Check for bare #NNNN references that should be linked
          BARE=$(grep -nP '[^[(]#\d{4}' "$ARTICLE" || true)
          if [ -n "$BARE" ]; then
            echo "WARNING: Bare issue/PR references found (should be linked):"
            echo "$BARE"
          fi

          # Count GitHub links as a sanity check
          LINK_COUNT=$(grep -c 'https://github.com/' "$ARTICLE" || echo 0)
          echo "Total GitHub links: $LINK_COUNT"

          # Check for duplicate consecutive links (common polish artifact)
          grep -nP '(\[.*?\]\(https://github\.com/[^)]+\)).*\1' "$ARTICLE" && echo "WARNING: Duplicate links found" || echo "No duplicate links"

      # ================================================================
      # STEP F: Validate mermaid syntax
      # ================================================================
      - name: Validate mermaid syntax
        id: mermaid_check
        continue-on-error: true
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          ARTICLE="case-studies/${SLUG}.md"

          [ ! -f "$ARTICLE" ] && { echo "No article — skipping"; exit 0; }

          python3 << 'PYEOF'
          import re, sys, os

          slug = os.environ.get("TARGET_REPO", "").replace("/", "-")
          path = f"case-studies/{slug}.md"

          with open(path) as f:
              content = f.read()

          blocks = re.findall(r'```mermaid\n(.*?)```', content, re.DOTALL)

          if not blocks:
              print("No mermaid blocks found")
              sys.exit(0)

          print(f"Found {len(blocks)} mermaid block(s)")
          errors = []

          for i, block in enumerate(blocks):
              b = block.strip()
              first = b.split('\n')[0].strip()

              valid = ['graph ', 'flowchart ', 'sequenceDiagram', 'classDiagram',
                       'stateDiagram', 'erDiagram', 'gantt', 'pie ', 'pie\n',
                       'journey', 'gitGraph', 'mindmap', 'timeline',
                       'quadrantChart', 'xychart', 'sankey', 'block']

              if not any(first.startswith(s) or first == s.strip() for s in valid):
                  errors.append(f"Block {i+1}: unrecognized type '{first}'")
                  continue

              if first == 'gantt':
                  if 'dateFormat' not in b: errors.append(f"Block {i+1} (gantt): missing dateFormat")
                  if 'section' not in b: errors.append(f"Block {i+1} (gantt): missing section")

              if first.startswith('pie'):
                  for line in [l.strip() for l in b.split('\n')[1:] if l.strip()]:
                      if line.startswith('"') and ':' not in line:
                          errors.append(f"Block {i+1} (pie): malformed '{line}'")

              if first == 'sequenceDiagram':
                  if 'participant' not in b and '->>' not in b:
                      errors.append(f"Block {i+1} (sequence): no participants or messages")

              if first.startswith(('graph', 'flowchart')):
                  if '-->' not in b and '---' not in b:
                      errors.append(f"Block {i+1} (graph): no edges")

              print(f"Block {i+1} ({first}): OK")

          if errors:
              print(f"\n{len(errors)} ERROR(S):")
              for e in errors: print(f"  - {e}")
              with open('/tmp/mermaid-errors.txt', 'w') as f:
                  f.write('\n'.join(errors))
              sys.exit(1)
          else:
              print("\nAll mermaid blocks valid")
          PYEOF

      - name: Fix mermaid errors (if any)
        if: steps.mermaid_check.outcome == 'failure'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Mermaid syntax errors were found. Read /tmp/mermaid-errors.txt.
            Fix each broken block in the article. Common fixes:
            - gantt: dateFormat YYYY-MM-DD HH:mm, axisFormat %H:%M
            - pie: "label" : value format
            - graph: edges use -->
            - sequenceDiagram: declare participants
            Do NOT change non-mermaid content.
          allowed_tools: Read,Edit,Grep

      - name: Generate and compress cover image
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          DATE=$(date +%Y-%m-%d)
          mkdir -p case-studies/images

          # Generate via DALL-E
          curl -s https://api.openai.com/v1/images/generations \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d '{
              "model": "gpt-image-1",
              "prompt": "Minimalist editorial illustration in warm amber and deep navy. A magnifying glass over code on an open book. Two figures reviewing work together collaboratively. No text, no logos. Style: The New Yorker meets a tech blog. 16:9.",
              "n": 1,
              "size": "1536x1024",
              "quality": "high"
            }' | python3 -c "
          import sys, json, base64
          data = json.load(sys.stdin)
          if 'data' in data and data['data']:
              img = data['data'][0]
              if 'b64_json' in img:
                  with open('/tmp/cover-raw.png', 'wb') as f:
                      f.write(base64.b64decode(img['b64_json']))
                  print('saved')
          " 2>/dev/null || echo "Cover image generation failed"

          # Compress PNG (try pngquant, fall back to python PIL, fall back to raw copy)
          IMG_DEST="case-studies/images/${DATE}-${SLUG}-cover.png"
          if [ -f /tmp/cover-raw.png ]; then
            if command -v pngquant &>/dev/null; then
              pngquant --quality=65-80 --output "$IMG_DEST" /tmp/cover-raw.png 2>/dev/null && echo "Compressed with pngquant"
            elif python3 -c "from PIL import Image" 2>/dev/null; then
              python3 -c "
          from PIL import Image
          img = Image.open('/tmp/cover-raw.png')
          img = img.convert('RGB')
          img.save('${IMG_DEST}'.replace('.png', '.jpg'), 'JPEG', quality=75, optimize=True)
          " 2>/dev/null && IMG_DEST="${IMG_DEST%.png}.jpg" && echo "Compressed with PIL to JPEG"
            else
              cp /tmp/cover-raw.png "$IMG_DEST" && echo "No compression tool — raw copy"
            fi

            RAW_SIZE=$(stat -f%z /tmp/cover-raw.png 2>/dev/null || stat -c%s /tmp/cover-raw.png 2>/dev/null || echo "?")
            FINAL_SIZE=$(stat -f%z "$IMG_DEST" 2>/dev/null || stat -c%s "$IMG_DEST" 2>/dev/null || echo "?")
            echo "Image: $RAW_SIZE -> $FINAL_SIZE bytes"
          fi

          # Rename article with date prefix
          OLD_ARTICLE="case-studies/${SLUG}.md"
          NEW_ARTICLE="case-studies/${DATE}-${SLUG}.md"
          if [ -f "$OLD_ARTICLE" ]; then
            mv "$OLD_ARTICLE" "$NEW_ARTICLE"
          fi

          # Insert image reference after title
          IMG_BASENAME=$(basename "$IMG_DEST")
          if [ -f "$IMG_DEST" ] && [ -f "$NEW_ARTICLE" ]; then
            python3 << PYEOF
          import re, os
          article = "${NEW_ARTICLE}"
          img_ref = "images/${IMG_BASENAME}"
          with open(article) as f:
              content = f.read()
          content = re.sub(r'^(# .+)$', r'\1\n\n![Cover](' + img_ref + ')', content, count=1, flags=re.MULTILINE)
          with open(article, 'w') as f:
              f.write(content)
          PYEOF
          fi

      - name: Log, commit, and close
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
          ISSUE_NUM: ${{ steps.target.outputs.issue }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          DATE=$(date +%Y-%m-%d)

          source auditor/scripts/log-event.sh

          ARTICLE="case-studies/${DATE}-${SLUG}.md"
          LINES=0
          [ -f "$ARTICLE" ] && LINES=$(wc -l < "$ARTICLE" | tr -d ' ')
          HAS_IMAGE=$([ -f "case-studies/images/${DATE}-${SLUG}-cover.png" ] || [ -f "case-studies/images/${DATE}-${SLUG}-cover.jpg" ] && echo true || echo false)

          log_event "case-study" "published" "{\"repo\": \"$TARGET_REPO\", \"article_lines\": $LINES, \"has_cover\": $HAS_IMAGE}"

          git config user.name "nlpm-auditor[bot]"
          git config user.email "nlpm-auditor[bot]@users.noreply.github.com"
          git add case-studies/ auditor/logs/events.jsonl
          bash auditor/scripts/guard-protected-paths.sh || exit 1
          git diff --cached --quiet || {
            git commit -m "case-study: $TARGET_REPO ($LINES lines)"
            git push
          }

          # Update registry
          jq --arg name "$TARGET_REPO" --arg cs "case-studies/${DATE}-${SLUG}.md" \
             '.repos[$name].status = "complete" | .repos[$name].case_study = $cs' \
             auditor/registry/repos.json > /tmp/reg.json && mv /tmp/reg.json auditor/registry/repos.json

          git add auditor/registry/repos.json
          bash auditor/scripts/guard-protected-paths.sh || exit 1
          git diff --cached --quiet || {
            git commit -m "chore: mark $TARGET_REPO complete"
            git push
          }

          # Comment and close issue
          SUMMARY="Case study published"
          [ -f /tmp/case-study-summary.txt ] && SUMMARY=$(cat /tmp/case-study-summary.txt)

          gh issue comment "$ISSUE_NUM" \
            --body "Case study published: [case-studies/${DATE}-${SLUG}.md](case-studies/${DATE}-${SLUG}.md) — ${SUMMARY}" \
            2>/dev/null || true
          gh issue edit "$ISSUE_NUM" --add-label "complete" --remove-label "case-study-ready" 2>/dev/null || true
          gh issue close "$ISSUE_NUM" --reason completed 2>/dev/null || true
